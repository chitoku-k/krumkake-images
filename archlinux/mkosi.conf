[Distribution]
Distribution=arch

[Output]
Format=disk

[Content]
Bootable=yes
Timezone=UTC
Packages=
    base
    bind
    cloud-init
    cni-plugins
    conntrack-tools
    containerd
    dnsmasq
    ethtool
    htop
    iotop
    iptables-nft
    less
    linux-lts
    openbsd-netcat
    openssh
    prometheus-node-exporter
    socat
    strongswan
    sudo
    tcpdump
    traceroute
    vim
    which
KernelCommandLine=
    audit=0
    systemd.ssh_auto=no
    zswap.enabled=0

[Build]
Environment=
    KUBERNETES_VERSION
    KUBERNETES_RELEASE
WithNetwork=true
